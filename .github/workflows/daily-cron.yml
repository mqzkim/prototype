name: Daily Update

on:
  schedule:
    # Runs daily at 09:00 UTC (18:00 KST)
    - cron: '0 9 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  daily-update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm install

      - name: Run daily update (all 5 features)
        run: npm run daily

      - name: Rebuild site
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Commit and push accumulated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet && echo "No changes to commit" && exit 0
          DATE=$(date +%Y-%m-%d)
          QUOTE=$(node -e "const d=JSON.parse(require('fs').readFileSync('data/daily-quote.json','utf-8')); console.log(d.quote?.author || 'unknown')")
          git commit -m "daily: ${DATE} — quote by ${QUOTE}

          Features updated:
          - Quote of the Day
          - Today I Learned
          - GitHub Trending
          - Auto Improvements log
          - Exchange rates & Seoul weather
          - Repo stats snapshot"
          git push
