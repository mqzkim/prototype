name: Structural Code Evaluation

on:
  workflow_dispatch:
  schedule:
    - cron: '0 10 * * 1'  # Every Monday 10:00 UTC

permissions:
  contents: write

concurrency:
  group: "structural-eval"
  cancel-in-progress: false

jobs:
  evaluate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm install

      - name: Run tests
        run: npm test

      - name: Generate codebase snapshot
        run: node scripts/evaluate-structural.js --prepare > snapshot.json 2> structural-summary.txt

      - name: Display auto-scores summary
        run: cat structural-summary.txt

      - name: Upload snapshot artifact
        uses: actions/upload-artifact@v4
        with:
          name: codebase-snapshot-${{ github.run_number }}
          path: |
            snapshot.json
            structural-summary.txt
          retention-days: 30

      - name: Run RULES.md evaluation
        run: npm run evaluate
        continue-on-error: true

      - name: Commit evaluation scores
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/evaluation-scores.json data/structural-scores.json
          git diff --staged --quiet && exit 0
          git commit -m "eval: structural snapshot $(date +%Y-%m-%d)"
          git push
